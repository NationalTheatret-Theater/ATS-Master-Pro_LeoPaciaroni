<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Professional Dynamic Configuration Bridge
      (function() {
        const script = document.createElement('script');
        script.src = '/env-config.js?v=' + Date.now();
        script.async = false;
        document.head.appendChild(script);
        console.log('[System] Identity Bridge requested...');
      })();

      window.onerror = function(msg, url, line, col, error) {
        var root = document.getElementById('root');
        if (root && !root.innerHTML.trim()) {
          root.innerHTML = '<div style="padding: 20px; color: red;"><h3>Startup Error</h3><p>' + msg + '</p></div>';
        }
        return false;
      };
    </script>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
